AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: "AllstoreZA \u2013 AI Virtual Try-On Stack Lambda (try-on engine) + DynamoDB\
  \ (4 tables) + Amplify (frontend hosting) Everything on free tier at MVP scale.\n"
Parameters:
  AppName:
    Type: String
    Default: allstoreza
  HuggingFaceUrl:
    Type: String
    Default: https://yisol-idm-vton.hf.space/--replicas/0/api/predict
  GitHubRepoUrl:
    Type: String
    Default: ''
    Description: 'Full HTTPS URL of your GitHub repo e.g. https://github.com/your-username/allstorez

      '
  GitHubBranch:
    Type: String
    Default: main
  AmplifyAccessToken:
    Type: String
    NoEcho: true
    Default: ''
    Description: 'GitHub personal access token (repo scope) for Amplify to pull your
      repo. Leave blank to wire Amplify manually after deploy.

      '
Globals:
  Function:
    Runtime: nodejs22.x
    Architectures:
    - arm64
    Timeout: 30
    MemorySize: 256
Resources:
  TryOnFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName:
        Fn::Sub: ${AppName}-tryon
      Handler: tryon.handler
      CodeUri: TryOnFunction
      Description: Proxies garment try-on requests to Hugging Face IDM-VTON
      Environment:
        Variables:
          HF_TRYON_URL:
            Ref: HuggingFaceUrl
          ALLOWED_ORIGIN: '*'
      FunctionUrlConfig:
        AuthType: NONE
        Cors:
          AllowCredentials: false
          AllowHeaders:
          - Content-Type
          AllowMethods:
          - '*'
          AllowOrigins:
          - '*'
          MaxAge: 86400
    Metadata:
      SamResourceId: TryOnFunction
  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName:
        Fn::Sub: ${AppName}-users
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: userId
        AttributeType: S
      KeySchema:
      - AttributeName: userId
        KeyType: HASH
  WardrobeTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName:
        Fn::Sub: ${AppName}-wardrobe
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: itemId
        AttributeType: S
      - AttributeName: userId
        AttributeType: S
      KeySchema:
      - AttributeName: itemId
        KeyType: HASH
      - AttributeName: userId
        KeyType: RANGE
      GlobalSecondaryIndexes:
      - IndexName: userId-index
        KeySchema:
        - AttributeName: userId
          KeyType: HASH
        Projection:
          ProjectionType: ALL
  CatalogTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName:
        Fn::Sub: ${AppName}-catalog
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: itemId
        AttributeType: S
      - AttributeName: storeSlug
        AttributeType: S
      KeySchema:
      - AttributeName: itemId
        KeyType: HASH
      - AttributeName: storeSlug
        KeyType: RANGE
      GlobalSecondaryIndexes:
      - IndexName: storeSlug-index
        KeySchema:
        - AttributeName: storeSlug
          KeyType: HASH
        Projection:
          ProjectionType: ALL
  StoresTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName:
        Fn::Sub: ${AppName}-stores
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: storeId
        AttributeType: S
      KeySchema:
      - AttributeName: storeId
        KeyType: HASH
  AmplifyApp:
    Type: AWS::Amplify::App
    Condition: HasAmplifyToken
    Properties:
      Name:
        Fn::Sub: ${AppName}-frontend
      Repository:
        Ref: GitHubRepoUrl
      AccessToken:
        Ref: AmplifyAccessToken
      BuildSpec: "version: 1\nfrontend:\n  phases:\n    preBuild:\n      commands:\n\
        \        - npm ci\n    build:\n      commands:\n        - npm run build\n\
        \  artifacts:\n    baseDirectory: dist\n    files:\n      - '**/*'\n  cache:\n\
        \    paths:\n      - node_modules/**/*\n"
      EnvironmentVariables:
      - Name: VITE_TRYON_LAMBDA_URL
        Value:
          Fn::GetAtt:
          - TryOnFunctionUrl
          - FunctionUrl
      CustomRules:
      - Source: </^[^.]+$|\.(?!(css|gif|ico|jpg|js|png|txt|svg|woff|woff2|ttf|map|json)$)([^.]+$)/>
        Target: /index.html
        Status: '200'
  AmplifyBranch:
    Type: AWS::Amplify::Branch
    Condition: HasAmplifyToken
    Properties:
      AppId:
        Fn::GetAtt:
        - AmplifyApp
        - AppId
      BranchName:
        Ref: GitHubBranch
      EnableAutoBuild: true
      Stage: PRODUCTION
Conditions:
  HasAmplifyToken:
    Fn::Not:
    - Fn::Equals:
      - Ref: AmplifyAccessToken
      - ''
Outputs:
  TryOnFunctionUrl:
    Description: "Lambda Function URL \u2014 set as VITE_TRYON_LAMBDA_URL in Amplify\
      \ if wiring manually"
    Value:
      Fn::GetAtt:
      - TryOnFunctionUrl
      - FunctionUrl
    Export:
      Name:
        Fn::Sub: ${AppName}-TryOnUrl
  AmplifyAppUrl:
    Condition: HasAmplifyToken
    Description: Live app URL
    Value:
      Fn::Sub: https://${GitHubBranch}.${AmplifyApp.DefaultDomain}
    Export:
      Name:
        Fn::Sub: ${AppName}-AppUrl
  UsersTableName:
    Value:
      Ref: UsersTable
    Export:
      Name:
        Fn::Sub: ${AppName}-UsersTable
  WardrobeTableName:
    Value:
      Ref: WardrobeTable
    Export:
      Name:
        Fn::Sub: ${AppName}-WardrobeTable
  CatalogTableName:
    Value:
      Ref: CatalogTable
    Export:
      Name:
        Fn::Sub: ${AppName}-CatalogTable
  StoresTableName:
    Value:
      Ref: StoresTable
    Export:
      Name:
        Fn::Sub: ${AppName}-StoresTable
